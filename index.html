<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R.I.D - Store</title>
    <link id="favicon" rel="icon" href="https://flaticon.com">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --accent: #8a2be2;
            --bg: #000000;
            --glass: rgba(138, 43, 226, 0.1);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            background: #000;
            background: radial-gradient(circle at center, #1a0033 0%, #000 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden; /* Запрещаем общий скролл body */
        }

        /* ШАПКА */
        header {
            height: 60px; display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.5);
        }
        h1 { margin: 0; font-size: 22px; letter-spacing: 4px; color: var(--accent); }

        /* ОСНОВНОЙ КОНТЕЙНЕР ДЛЯ СТРАНИЦ */
        main {
            height: calc(100vh - 130px); /* Вычитаем высоту хедера (60) и меню (70) */
            overflow-y: auto; /* Скролл только внутри контента */
            padding: 20px;
        }

        .page { display: none; width: 100%; height: 100%; }
        .page.active { display: block; }

        /* СТЕКЛЯННЫЙ СТИЛЬ */
        .glass {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 15px;
        }

        /* МАГАЗИН */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { padding: 15px; text-align: center; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }

        /* ЧАТ (ИСПРАВЛЕНО: НА ВЕСЬ ЭКРАН) */
        .chat-wrapper {
            display: flex; flex-direction: column;
            height: 100%; /* Занимает всю высоту контента */
        }
        #user-chat-box {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .user-m { background: var(--accent); align-self: flex-end; }
        .bot-m { background: #222; align-self: flex-start; }

        /* НИЖНЕЕ МЕНЮ */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.9); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { color: #fff; opacity: 0.5; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; }
        .nav-item span { font-size: 10px; margin-top: 5px; display: block; }

        /* АДМИНКА */
        .admin-card { padding: 20px; margin-bottom: 15px; }
        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #111; border: 1px solid var(--border); color: #fff; border-radius: 8px;
        }
        button {
            background: var(--accent); color: #fff; border: none; padding: 12px;
            border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer;
        }

        #admin-chat-monitor {
            height: 150px; overflow-y: auto; background: #000;
            padding: 10px; font-size: 12px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>R.I.D</h1>
    </header>

    <main>
        <!-- МАГАЗИН -->
        <section id="home" class="page active">
            <div id="product-list" class="shop-grid"></div>
            <h3 style="margin-top:30px">Статьи</h3>
            <div id="article-list"></div>
        </section>

        <!-- ПОДДЕРЖКА (ТЕПЕРЬ НА ВЕСЬ ЭКРАН) -->
        <section id="support" class="page">
            <div class="chat-wrapper glass">
                <div id="user-chat-box">
                    <div class="msg bot-m">Добро пожаловать в R.I.D Support. Напишите ваш вопрос.</div>
                </div>
                <div style="padding:10px; border-top: 1px solid var(--border)">
                    <input type="text" id="user-chat-input" placeholder="Ваше сообщение..." onkeypress="if(event.key==='Enter') sendUserMsg()">
                </div>
            </div>
        </section>

        <!-- АДМИНКА -->
        <section id="admin" class="page">
            <div class="admin-card glass">
                <h4 style="margin:0 0 10px 0; color:var(--accent)">Вопросы клиентов</h4>
                <div id="admin-chat-monitor"></div>
            </div>
            
            <div class="admin-card glass">
                <h4>Добавить товар</h4>
                <input type="text" id="p-name" placeholder="Название">
                <input type="number" id="p-price" placeholder="Цена">
                <input type="text" id="p-img" placeholder="Ссылка на фото">
                <textarea id="p-desc" placeholder="Описание"></textarea>
                <button onclick="addItem('product')">Опубликовать</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" id="btn-home" onclick="showPage('home')">
            <i class="fa-solid fa-house"></i><span>Дом</span>
        </div>
        <div class="nav-item" id="btn-support" onclick="showPage('support')">
            <i class="fa-solid fa-comment-dots"></i><span>Чат</span>
        </div>
        <div class="nav-item" id="btn-admin" onclick="authAdmin()">
            <i class="fa-solid fa-user-shield"></i><span>Админ</span>
        </div>
    </nav>

    <script>
        let pass = "Rid1962";
        const wallet = "5599002136769405";

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        function authAdmin() {
            let p = prompt("Пароль:");
            if(p === pass) showPage('admin');
            else alert("Нет!");
        }

        function sendUserMsg() {
            let i = document.getElementById('user-chat-input');
            if(!i.value) return;
            
            document.getElementById('user-chat-box').innerHTML += `<div class="msg user-m">${i.value}</div>`;
            
            // Отправка в админку
            let monitor = document.getElementById('admin-chat-monitor');
            let time = new Date().toLocaleTimeString();
            monitor.innerHTML = `<div>[${time}] <b>Клиент:</b> ${i.value}</div>` + monitor.innerHTML;
            
            i.value = '';
            let box = document.getElementById('user-chat-box');
            box.scrollTop = box.scrollHeight;
        }

        function addItem(type) {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value || 'https://placeholder.com';
            const d = document.getElementById('p-desc').value;

            const html = `
                <div class="card glass">
                    <img src="${img}">
                    <h3>${n}</h3>
                    <p style="font-size:12px; opacity:0.6">${d}</p>
                    <div style="font-size:18px; color:var(--accent); margin:10px 0">${p} ₽</div>
                    <button onclick="pay('${n}', ${p})">Купить</button>
                </div>`;
            document.getElementById('product-list').innerHTML += html;
            alert("Готово!");
            showPage('home');
        }

        function pay(t, s) {
            const url = `https://yoomoney.ru{encodeURIComponent(t)}&sum=${s}&paymentType=AC&label=${wallet}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
