<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HELLSING</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  border-bottom: 1px solid #111;
}

.logo {
  font-size: 26px;
  letter-spacing: 6px;
}

.search {
  background: #111;
  border: none;
  padding: 8px;
  color: white;
}

/* GRID */
.container {
  padding: 20px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 20px;
}

.card {
  background: #111;
  padding: 15px;
  transition: 0.3s;
}

.card:hover {
  background: #1a0000;
}

/* BUTTON */
button {
  background: red;
  border: none;
  padding: 10px;
  color: white;
  cursor: pointer;
}

/* CART */
.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 320px;
  height: 100%;
  background: #111;
  padding: 20px;
  display: none;
}

/* ADMIN */
.admin {
  position: fixed;
  bottom: 0;
  left: 0;
  background: #111;
  padding: 15px;
  width: 100%;
  display: none;
}
</style>
</head>

<body>

<header>
  <div class="logo">HELLSING</div>
  <input class="search" placeholder="Поиск..." oninput="search(this.value)">
  <div>
    <button onclick="toggleCart()">🛒</button>
    <button onclick="toggleAdmin()">⚙️</button>
  </div>
</header>

<div class="container">
  <div class="products" id="products"></div>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Корзина</h2>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
  <button onclick="checkout()">Оплатить</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="admin">
  <h3>Добавить товар</h3>
  <input id="name" placeholder="Название"><br>
  <input id="price" placeholder="Цена"><br>
  <input id="desc" placeholder="Описание"><br>
  <button onclick="addProduct()">Добавить</button>
</div>

<script>
let products = [
  {name:"Hoodie Black",price:4990,desc:"Oversize hoodie"},
  {name:"T-shirt Red",price:2990,desc:"Premium cotton"}
];

let cart = [];

function renderProducts(list){
  let el = document.getElementById("products");
  el.innerHTML = "";

  list.forEach((p,i)=>{
    el.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <b>${p.price} ₽</b><br><br>
        <button onclick="addToCart(${i})">В корзину</button>
      </div>
    `;
  });
}

function addToCart(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  let el = document.getElementById("cartItems");
  let total = 0;
  el.innerHTML = "";

  cart.forEach(p=>{
    total += p.price;
    el.innerHTML += `<div>${p.name} - ${p.price} ₽</div>`;
  });

  document.getElementById("total").innerText = "Итого: " + total + " ₽";
}

function toggleCart(){
  let el = document.getElementById("cart");
  el.style.display = el.style.display==="block"?"none":"block";
}

function search(q){
  let filtered = products.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase()) ||
    p.desc.toLowerCase().includes(q.toLowerCase())
  );
  renderProducts(filtered);
}

/* ADMIN */
function toggleAdmin(){
  let el = document.getElementById("admin");
  el.style.display = el.style.display==="block"?"none":"block";
}

function addProduct(){
  let name = document.getElementById("name").value;
  let price = parseInt(document.getElementById("price").value);
  let desc = document.getElementById("desc").value;

  products.push({name,price,desc});
  renderProducts(products);
}

/* PAYMENT */
function checkout(){
  alert("Здесь будет подключение YooKassa");
}

renderProducts(products);
</script>

</body>
</html>
