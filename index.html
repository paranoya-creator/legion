<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D — Магазин</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg: #050308;
            --panel: #0d0915;
            --accent: #9d00ff;
            --text: #ffffff;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* Навигация */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(5, 3, 8, 0.95);
            border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }

        .logo-box img { height: 40px; cursor: pointer; transition: 0.3s; }
        
        /* Боковая панель */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: var(--panel); border-right: 1px solid var(--accent);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; padding: 30px 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }

        /* Кнопки и карточки */
        .btn-ui {
            background: #150f25; border: 1px solid var(--accent); color: white;
            padding: 10px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
        }
        .btn-ui:hover { background: var(--accent); box-shadow: 0 0 15px var(--accent); color: black; }

        .buy-btn {
            background: var(--accent); color: white; border: none; padding: 12px;
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding: 25px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--panel); border: 1px solid #1e1533; border-radius: 15px; overflow: hidden; transition: 0.3s; padding: 15px; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* Консультанты */
        .staff-box {
            background: #1a1428; padding: 12px; border-radius: 12px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 12px; text-decoration: none; color: white;
            border: 1px solid transparent; transition: 0.3s;
        }
        .staff-box:hover { border-color: var(--accent); background: #221a35; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; }

        /* Модалки */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 3000; }
        .modal-content { background: var(--panel); width: 85%; max-width: 380px; margin: 100px auto; padding: 35px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #332755; color: white; border-radius: 8px; box-sizing: border-box; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1500; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeNav()"></div>

<!-- Меню -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3 style="font-family: 'Orbitron'; margin: 0;">R.I.D МЕНЮ</h3>
        <i data-lucide="arrow-left" onclick="closeNav()" style="cursor:pointer"></i>
    </div>
    
    <p style="font-size: 0.7rem; color: #666; margin-bottom: 15px;">СВЯЗЬ С НАМИ:</p>
    <div id="staff-list"></div>

    <div style="margin-top: 40px; border-top: 1px solid #222; padding-top: 20px;">
        <button class="btn-ui" style="width:100%" onclick="toggleM('admin-modal')">
            <i data-lucide="shield-check"></i> АДМИН-ПАНЕЛЬ
        </button>
    </div>
</div>

<nav>
    <button class="btn-ui" onclick="openNav()"><i data-lucide="menu"></i></button>
    
    <div class="logo-box" onclick="adminHit()">
        <img src="logo.png" alt="R.I.D" onerror="this.src='https://placeholder.com'">
    </div>

    <button class="btn-ui" onclick="toggleM('profile-modal')">
        <i data-lucide="user"></i> <span id="btn-name">ВХОД</span>
    </button>
</nav>

<div class="container">
    <div class="grid" id="catalog"></div>
</div>

<!-- Модалка Профиля -->
<div id="profile-modal" class="modal">
    <div class="modal-content">
        <h2 style="font-family: 'Orbitron'; color: var(--accent);">R.I.D АККАУНТ</h2>
        <div id="auth-form">
            <input type="text" id="reg-name" placeholder="Ваше Имя">
            <input type="email" id="reg-email" placeholder="Почта">
            <button class="buy-btn" onclick="saveUser()">ВОЙТИ</button>
        </div>
        <div id="user-info" style="display:none;">
            <h3 id="hi-name" style="font-family: 'Orbitron';"></h3>
            <p id="hi-mail" style="color: #666;"></p>
            <button class="buy-btn" style="background:#222; margin-top:20px;" onclick="exitUser()">ВЫЙТИ</button>
        </div>
        <p onclick="toggleM('profile-modal')" style="margin-top:20px; color:#444; cursor:pointer; font-size: 0.7rem;">ЗАКРЫТЬ</p>
    </div>
</div>

<!-- Модалка Админки -->
<div id="admin-modal" class="modal">
    <div class="modal-content">
        <h3 style="font-family: 'Orbitron';">R.I.D ПАНЕЛЬ</h3>
        <input type="password" id="pass" placeholder="Пароль">
        <button class="buy-btn" onclick="goAdmin()">ВОЙТИ</button>
        <div id="tools" style="display:none; margin-top:20px; border-top: 1px solid #333; padding-top:15px;">
            <input type="text" id="in-name" placeholder="Название товара">
            <input type="text" id="in-price" placeholder="Цена">
            <button class="buy-btn" style="background:#00ff00; color:black;" onclick="add()">ДОБАВИТЬ</button>
        </div>
    </div>
</div>

<script>
    let goods = JSON.parse(localStorage.getItem('rid_v5_items')) || [
        {name: "R.I.D Hoodie Black", price: "5500 ₽"},
        {name: "R.I.D Sticker Pack", price: "450 ₽"}
    ];
    // ТВОИ ДАННЫЕ ДОБАВЛЕНЫ ЗДЕСЬ
    let crew = JSON.parse(localStorage.getItem('rid_v5_crew')) || [
        {role: "Владелец", name: "@deirq", tg: "https://t.me", icon: "crown"},
        {role: "Зам", name: "R.I.D Vice", tg: "#", icon: "shield"},
        {role: "Поддержка", name: "Staff", tg: "#", icon: "message-circle"}
    ];
    let client = JSON.parse(localStorage.getItem('rid_final_user')) || null;
    let hits = 0;

    function render() {
        const cat = document.getElementById('catalog');
        cat.innerHTML = goods.map(g => `
            <div class="card">
                <div style="height:150px; background:#11081d; display:flex; align-items:center; justify-content:center;">
                    <i data-lucide="package" size="40" color="#221533"></i>
                </div>
                <div style="padding-top:15px; text-align:center;">
                    <h4 style="margin:0; font-size:0.9rem;">${g.name}</h4>
                    <div style="color:var(--accent); font-weight:bold; margin:8px 0;">${g.price}</div>
                    <button class="buy-btn" onclick="alert('Добавлено!')">КУПИТЬ</button>
                </div>
            </div>
        `).join('');

        const sl = document.getElementById('staff-list');
        sl.innerHTML = crew.map(c => `
            <a href="${c.tg}" class="staff-box" target="_blank">
                <div class="avatar"><i data-lucide="${c.icon || 'user'}" color="black" size="18"></i></div>
                <div>
                    <div style="font-size:0.6rem; color:var(--accent); font-weight:bold;">${c.role}</div>
                    <div style="font-weight:bold;">${c.name}</div>
                </div>
            </a>
        `).join('');

        lucide.createIcons();
        ui();
    }

    function saveUser() {
        const n = document.getElementById('reg-name').value;
        const e = document.getElementById('reg-email').value;
        if(n && e) { client = {name:n, email:e}; localStorage.setItem('rid_final_user', JSON.stringify(client)); render(); }
    }
    function exitUser() { localStorage.removeItem('rid_final_user'); client = null; render(); }
    
    function ui() {
        const f = document.getElementById('auth-form'), b = document.getElementById('user-info'), l = document.getElementById('btn-name');
        if(client) {
            f.style.display = 'none'; b.style.display = 'block';
            document.getElementById('hi-name').innerText = client.name;
            document.getElementById('hi-mail').innerText = client.email;
            l.innerText = client.name.toUpperCase();
        } else { f.style.display = 'block'; b.style.display = 'none'; l.innerText = "ВХОД"; }
    }

    function openNav() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
    function closeNav() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
    function toggleM(id) { const m = document.getElementById(id); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
    function adminHit() { hits++; if(hits >= 5) { toggleM('admin-modal'); hits = 0; } setTimeout(()=>hits=0, 2000); }
    function goAdmin() { if(document.getElementById('pass').value === 'rid') document.getElementById('tools').style.display = 'block'; }
    function add() {
        const n = document.getElementById('in-name').value, p = document.getElementById('in-price').value;
        if(n && p) { goods.push({name:n, price:p}); localStorage.setItem('rid_v5_items', JSON.stringify(goods)); render(); }
    }
    render();
</script>
</body>
</html>
