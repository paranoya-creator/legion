<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D — Professional Store</title>
    <!-- Подключаем Firebase (Версия 9 COMPAT) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://unpkg.com"></script>
    <style>
        :root { --accent: #9d00ff; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-size: 1.5rem; cursor: pointer; text-shadow: 0 0 10px var(--accent); }
        
        /* Админка */
        #admin-zone { display: none; background: #1a1a1a; padding: 25px; border-radius: 20px; margin: 20px auto; max-width: 500px; border: 1px solid var(--accent); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 20px var(--accent); }

        /* Сетка */
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 40px; }
        .product { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; position: relative; }
        .product:hover { border-color: var(--accent); transform: translateY(-5px); }
        .product img { width: 100%; height: 280px; object-fit: cover; background: #000; }
        .p-info { padding: 20px; text-align: center; }
        .p-price { color: var(--accent); font-weight: 900; font-size: 1.5rem; margin: 10px 0; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="adminLogin()">R.I.D</div>
    <a href="https://t.me" target="_blank" style="text-decoration:none; color:var(--accent); font-weight:bold;">СВЯЗЬ</a>
</nav>

<div id="admin-zone">
    <h3 style="margin-top:0">Добавить товар</h3>
    <input type="text" id="p-img" placeholder="Ссылка на фото (URL)">
    <input type="text" id="p-name" placeholder="Название">
    <input type="text" id="p-price" placeholder="Цена (например: 5500 ₽)">
    <button class="btn" onclick="saveToFirebase()">ОПУБЛИКОВАТЬ</button>
</div>

<div class="catalog" id="list"></div>

<script>
    // ВСТАВЬ СВОИ ДАННЫЕ ИЗ СКРИНШОТА СЮДА:
    const firebaseConfig = {
        apiKey: "AIzaSyCMdjHAttDdvtAAVGKu...", 
        authDomain: "://firebaseapp.com",
        projectId: "ridd-e1634",
        storageBucket: "://appspot.com",
        messagingSenderId: "405816096080",
        appId: "1:405816096080:web:dc0b41...",
        measurementId: "G-VH5J07K7PK"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Загрузка товаров
    db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
        const list = document.getElementById('list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const p = doc.data();
            list.innerHTML += `
                <div class="product">
                    <button class="del-btn" onclick="deleteItem('${doc.id}')">Удалить</button>
                    <img src="${p.img}" onerror="this.src='https://placeholder.com'">
                    <div class="p-info">
                        <h3 style="font-family:'Orbitron'">${p.name}</h3>
                        <div class="p-price">${p.price}</div>
                        <button class="btn" onclick="location.href='https://t.me'">КУПИТЬ</button>
                    </div>
                </div>
            `;
        });
    });

    async function saveToFirebase() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;

        if(!name || !price || !img) return alert("Заполни все поля!");

        await db.collection('products').add({
            name, price, img,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Товар добавлен в облако!");
        document.getElementById('admin-zone').style.display = 'none';
    }

    function deleteItem(id) {
        if(confirm("Удалить товар навсегда?")) db.collection('products').doc(id).delete();
    }

    function adminLogin() {
        const p = prompt("Пароль:");
        if(p === "rid") {
            document.getElementById('admin-zone').style.display = 'block';
            document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'block');
        }
    }
</script>
</body>
</html>
